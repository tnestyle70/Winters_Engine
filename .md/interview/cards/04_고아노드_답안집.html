<style>
  :root{

  .bar{max-width:210mm;margin:0 auto 16px;background:#fff;border:1px solid var(--ink);padding:10px 14px;

  .nh{display:flex;justify-content:space-between;align-items:baseline;gap:4px;margin-bottom:1.2mm}
  .nm{font:700 9.6px/1.3 var(--kr)}
  .nc{font:700 7.5px/1 var(--mono);color:var(--grey);white-space:nowrap;letter-spacing:.04em}
  .core{font:8.6px/1.5 var(--kr);border-left:1.8px solid var(--ink);padding-left:2mm;margin-bottom:1.4mm}
  .core b{font-weight:700}
  .num{font:8px/1.45 var(--mono);background:var(--faint);padding:1.2mm 2mm;margin-bottom:1.4mm;white-space:pre-wrap}
  .qa{font:8.2px/1.45 var(--kr);margin-bottom:1mm}
  .qa i{font-style:normal;font:700 7.5px var(--mono);color:var(--grey);margin-right:1.4mm}

  @page{size:A4;margin:0}

<script>
// [챕터, 이름, 표시, 핵심, 숫자, Q, A, 함정]
const D = [
["§ D1 · 컴퓨터구조","전자는 유한 속도로 움직인다 → 이동이 계산보다 비싸진다"],

["D1-1","fetch → decode → execute → memory → writeback","⚑⚑",
 "한 명령의 생애 5단계. <b>이 5단계를 겹치는 게 파이프라인</b>이고, 겹치니까 해저드가 생기고, 해저드를 숨기려고 포워딩·예측·OoO가 전부 따라 나온다.",
 "",
 "5단계를 왜 나눴나?",
 "단계를 나누면 각 단계가 짧아져 클럭을 올릴 수 있고, 서로 다른 명령이 서로 다른 단계를 동시에 점유해 <b>처리량</b>이 올라갑니다. 지연은 그대로거나 오히려 늘어납니다 — 처리량과 지연은 다른 값입니다.",
 "\"파이프라인이 명령을 빠르게 한다\"는 틀림. <b>하나는 더 느려지고 전체 처리량이 올라가는 것</b>."],

["D1-1","ISA · CISC vs RISC · μop","",
 "x86-64는 <b>겉은 CISC, 속은 RISC</b>. 디코더가 복잡한 명령을 μop으로 쪼개 내부 RISC 코어에 넣는다. μop 캐시가 디코딩 자체를 건너뛴다.",
 "",
 "요즘도 CISC/RISC 구분이 의미 있나?",
 "실행 코어 관점에선 거의 없습니다. 디코더 복잡도와 코드 밀도에서만 남습니다. ARM이 유리한 건 명령 길이가 고정이라 디코딩이 병렬화되기 쉬운 점입니다.",
 ""],

["D1-1","해저드 3종 · 포워딩","",
 "<b>구조</b>(자원 부족) · <b>데이터</b>(RAW/WAR/WAW) · <b>제어</b>(분기). 포워딩은 결과를 레지스터 쓰기 전에 다음 단계로 직결해 RAW 스톨을 없앤다. WAR/WAW는 <b>리네이밍</b>이 없앤다 — 진짜 의존이 아니라 이름 충돌이라서.",
 "",
 "RAW는 왜 리네이밍으로 못 없애나?",
 "진짜 데이터 의존이기 때문입니다. WAR/WAW는 레지스터 이름이 부족해서 생긴 가짜 의존이라 이름을 늘리면 사라지지만, RAW는 값 자체가 필요합니다.",
 ""],

["D1-1","OoO · Tomasulo · ROB · 리네이밍","",
 "순서대로 <b>발행</b>하고, 순서 없이 <b>실행</b>하고, 다시 순서대로 <b>은퇴</b>한다. 예약 스테이션이 피연산자를 기다리고, ROB가 은퇴 순서를 강제해 예외/투기 롤백을 가능하게 한다.",
 "",
 "왜 굳이 순서대로 은퇴하나?",
 "정밀 예외 때문입니다. 예외 시점에 아키텍처 상태가 정확히 그 명령까지만 반영돼 있어야 복구가 됩니다. 투기 실행 롤백도 같은 메커니즘입니다.",
 "OoO는 <b>메모리 지연을 숨기는</b> 기계다. 캐시 미스가 400cyc면 OoO 윈도우로 다 못 숨긴다 → C2가 이긴다."],

["D1-1","슈퍼스칼라 · IPC의 정의와 한계","⚑",
 "<b>IPC = 사이클당 은퇴 명령 수</b>. 발행 폭이 4~6이어도 실측 IPC는 보통 1~2. 이유는 의존·분기·캐시 미스.",
 "IPC 이론 4~6 / 실측 1~2\n분기 미스 15~20cyc\nDRAM 미스 200~400cyc",
 "IPC를 어떻게 올리나?",
 "명령을 줄이는 게 아니라 <b>스톨을 줄입니다</b>. 의존 사슬을 끊고, 분기를 예측 가능하게 만들거나 없애고, 캐시 미스를 줄입니다. 실무에서 셋 중 캐시가 압도적입니다.",
 "IPC가 높다고 빠른 게 아니다 — 명령 수 × IPC⁻¹ × 클럭이 시간. 명령을 늘려 IPC를 올리면 손해."],

["D1-1","ILP의 벽 → 왜 코어로 갔나","⚑ C3",
 "IPC를 더 못 올린 게 아니라 <b>전력이 막았다</b>. Dennard 스케일링이 2005년경 끝나 클럭·복잡도 증가의 전력 비용이 감당 불가가 됐고, 남은 트랜지스터를 코어 수로 썼다. <b>병렬 프로그래밍은 선택이 아니라 청구서다.</b>",
 "Dennard 종료 ≈ 2005\n이후 성능 = 코어 수 × 병렬화율",
 "왜 클럭이 안 오르나?",
 "동적 전력이 전압²×주파수에 비례하는데 Dennard 종료로 전압을 더 못 낮춰서, 주파수를 올리면 전력이 그대로 따라 올라 열 밀도가 한계에 걸립니다. 그래서 코어 수로 방향을 틀었습니다.",
 "<b>ECS도 job system도 이 사건의 자식이다.</b> 2005 이전 엔진에 없는 이유."],

["D1-1","투기 실행의 대가 · Spectre / Meltdown","",
 "투기 실행은 아키텍처 상태는 롤백하지만 <b>캐시 상태는 롤백 안 한다</b>. 그 잔여물로 비밀을 읽는다. 완화(KPTI, retpoline)의 대가는 syscall 비용 상승.",
 "",
 "게임 개발자에게 왜 중요한가?",
 "직접 대응할 일은 거의 없지만, 완화 패치로 <b>시스템 콜 비용이 올라간</b> 게 실제 영향입니다. I/O 배칭의 근거가 더 세졌습니다.",
 ""],

["D1-2","지연 수치 카드","⚑⚑⚑",
 "<b>모든 최적화 대화의 좌표계.</b> 자릿수만 정확해도 상위권.",
 "L1     ~4 cyc\nL2     ~12 cyc\nL3     ~40 cyc\nDRAM   200~400 cyc  ← 벽\n분기미스 15~20 cyc\nsyscall ~100~300 ns\n스위치  ~1~5 μs\nNVMe   ~100 μs\n\n프레임 16.6ms @60fps\n틱     33.3ms @30Hz",
 "L3 미스가 왜 그렇게 비싼가?",
 "DRAM 접근이 200~400사이클인데, 이 동안 OoO 윈도우로 숨길 수 있는 독립 작업이 그만큼 없으면 코어가 그냥 섭니다. <b>3GHz에서 400사이클은 약 130ns</b>이고, 미스 10,000번이면 1.3ms — 60fps 예산의 8%가 대기입니다.",
 "숫자를 외우지 말고 <b>자릿수 순서</b>를 외운다. cyc → ns → μs → ms."],

["D1-2","캐시 라인 64B · 태그/인덱스/오프셋","⚑",
 "메모리는 바이트가 아니라 <b>64B 단위로 이동한다</b>. 1바이트를 읽어도 64B가 온다. 주소는 오프셋(하위 6비트) / 인덱스(세트 선택) / 태그(나머지)로 쪼개진다.",
 "라인 64B\n1B 읽어도 64B 전송",
 "왜 하필 64바이트인가?",
 "공간 지역성 이득과 전송 낭비의 절충점입니다. 크면 낭비가 늘고 작으면 태그 오버헤드와 미스 횟수가 늘어납니다.",
 "<b>이 한 줄이 SoA·false sharing·정렬·구조체 배치의 공통 원인</b>이다."],

["D1-2","미스 3종 · 교체 · 쓰기 정책","",
 "<b>compulsory</b>(첫 접근, 프리페치로만 완화) · <b>capacity</b>(용량 부족, 데이터를 줄여야) · <b>conflict</b>(연관도 부족, 배치를 바꿔야). <b>진단이 처방을 결정한다.</b> write-back이 기본 — 쓰기를 모아 대역폭을 아낀다.",
 "",
 "어떤 미스인지 어떻게 아나?",
 "작업 집합을 줄여봐서 사라지면 capacity, 배열 stride나 정렬을 바꿔서 사라지면 conflict, 둘 다 아니면 compulsory입니다. PMU 카운터로 미스율을 먼저 재고 판단합니다.",
 ""],

["D1-2","프리페처","",
 "하드웨어가 <b>일정한 stride를 감지</b>해 미리 당긴다. 그래서 선형 순회가 빠른 진짜 이유의 절반은 프리페처다. 포인터 추적은 다음 주소를 미리 못 알아서 프리페처가 무력해진다.",
 "",
 "그럼 소프트웨어 프리페치는 언제 쓰나?",
 "하드웨어가 못 잡는 불규칙 패턴에서, 접근보다 충분히 앞서(수백 사이클) 발행할 수 있을 때만 이득입니다. 잘못 쓰면 캐시를 오염시켜 손해입니다.",
 "<b>linked list가 느린 이유는 O(n)이 아니라 프리페치 불가</b>. 이게 std::list 회피의 진짜 근거."],

["D1-2","DRAM 내부 · NUMA","",
 "DRAM은 <b>뱅크 → 로우 → 컬럼</b>. 같은 로우를 연속 접근하면(로우 히트) 훨씬 싸다. NUMA에선 리모트 노드 접근이 로컬의 1.5~2배.",
 "로우 히트 vs 미스 ≈ 2~3배\nNUMA 리모트 ≈ 1.5~2배",
 "게임 서버에서 NUMA를 신경 쓰나?",
 "단일 소켓이면 무의미하고, 듀얼 소켓 서버에서 워커 스레드와 그 스레드가 만지는 메모리를 같은 노드에 묶을 때 의미가 있습니다. 측정 없이 하면 오히려 손해입니다.",
 ""],

["D1-3","MESI · 라인 핑퐁","",
 "<b>M</b>odified · <b>E</b>xclusive · <b>S</b>hared · <b>I</b>nvalid. 한 코어가 쓰면 다른 코어의 사본이 무효화된다. 두 코어가 같은 라인을 번갈아 쓰면 <b>라인이 코어 사이를 왕복</b>한다 — 이게 false sharing의 하드웨어 정체.",
 "핑퐁 1회 ≈ 수십~100+ cyc",
 "false sharing과 true sharing의 차이는?",
 "true sharing은 실제로 같은 변수를 공유하는 것이라 알고리즘을 바꿔야 하고, false sharing은 <b>서로 다른 변수가 우연히 같은 64B 라인에 있는 것</b>이라 패딩만으로 사라집니다. 후자는 공짜 수정입니다.",
 ""],

["D1-3","store buffer → StoreLoad 재정렬","⚑⚑",
 "쓰기는 즉시 캐시로 안 간다 — <b>store buffer</b>에 잠깐 머문다. 그래서 내 쓰기가 남에게 아직 안 보이는 동안 내 다음 읽기가 먼저 나간다. <b>x86에서 유일하게 살아남는 재정렬이 StoreLoad</b>이고, Dekker/Peterson이 깨지는 정확한 지점.",
 "x86-TSO 허용: StoreLoad만\n금지: StoreStore·LoadLoad·LoadStore",
 "x86은 강한 모델인데 왜 fence가 필요한가?",
 "StoreLoad 하나가 남아 있기 때문입니다. 서로 다른 두 변수에 각각 쓰고 상대를 읽는 패턴에서 둘 다 옛 값을 읽을 수 있습니다. <b>mfence</b>나 lock 명령이 store buffer를 비웁니다.",
 "<b>\"x86에서 잘 도는데요\"가 가장 위험한 문장.</b> ARM 콘솔/모바일에서 터진다."],

["D1-3","x86-TSO vs ARM 약한 모델","⚑",
 "x86은 거의 순서를 지킨다(TSO). ARM/POWER는 <b>거의 안 지킨다</b> — 명시적 배리어가 없으면 대부분 재정렬 가능. 그래서 C++ memory_order는 x86에선 대체로 공짜고 ARM에선 실제 명령이 나간다.",
 "x86: acquire/release ≈ 0 비용\nARM: 실제 dmb 명령 발생",
 "그럼 어느 모델을 기준으로 코딩하나?",
 "<b>C++ 메모리 모델을 기준</b>으로 합니다. 하드웨어가 아니라 언어 계약에 맞춰 쓰면 x86에선 공짜이고 ARM에서도 옳습니다. 하드웨어에 맞추면 이식할 때 조용히 깨집니다.",
 ""],

["D1-3","CAS strong vs weak","",
 "<b>weak</b>는 값이 같아도 실패할 수 있다(spurious). 대신 LL/SC 아키텍처(ARM)에서 재시도 루프가 없어 더 싸다. <b>이미 루프 안이면 weak, 단발이면 strong.</b>",
 "",
 "왜 weak이 spurious 실패를 하나?",
 "ARM 같은 LL/SC 구현에서 중간에 인터럽트나 캐시 이벤트가 나면 SC가 실패합니다. strong은 그걸 감추려고 내부 루프를 돌아 더 비쌉니다. 어차피 밖에서 루프를 돈다면 weak이 맞습니다.",
 ""],

["D1-4","SIMD · 자동 벡터화 조건","",
 "레지스터 하나에 여러 값. AVX2는 256비트 = float 8개. 자동 벡터화 조건: <b>반복 횟수 고정 · 의존 없음 · 분기 없음 · 앨리어싱 없음</b>. 마지막이 실무에서 가장 자주 막는다.",
 "SSE 128b = float×4\nAVX2 256b = float×8\nAVX-512 = float×16 (클럭 하락 주의)",
 "왜 앨리어싱이 벡터화를 막나?",
 "컴파일러가 두 포인터가 같은 메모리를 가리킬 가능성을 배제 못 하면 순서를 못 바꿉니다. <b>__restrict</b>로 계약을 주거나 값 복사로 끊습니다.",
 "AVX-512는 클럭을 떨어뜨려 <b>전체가 느려질 수 있다</b>. 측정 필수."],

["D1-4","GPU · SM / warp / SIMT","⚑",
 "GPU는 <b>32스레드(warp)가 한 명령을 함께</b> 실행한다. 분기가 갈리면 양쪽을 순차 실행하고 안 맞는 레인은 마스킹 — 그게 다이버전스 비용. occupancy는 지연을 숨길 warp이 충분한가의 지표.",
 "warp = 32 스레드\n다이버전스 최악 = 32배",
 "CPU 스레드와 GPU 스레드가 어떻게 다른가?",
 "CPU 스레드는 독립적으로 분기하지만 GPU는 <b>warp 단위로 명령을 공유</b>합니다. 그래서 GPU는 스레드가 많아서 빠른 게 아니라, 지연이 나면 다른 warp로 갈아타서 빠릅니다 — 지연 은닉 기계입니다.",
 "occupancy가 높다고 빠른 게 아니다. 레지스터를 줄여 occupancy를 올리면 spill로 더 느려질 수 있다."],

["D1-4","암달 / 구스타프손","",
 "<b>암달</b>: 직렬 부분이 상한을 정한다 — 5%가 직렬이면 코어가 무한이어도 20배가 끝. <b>구스타프손</b>: 문제 크기를 키우면 병렬 부분이 커져 상한이 완화된다.",
 "직렬 5% → 최대 20배\n직렬 1% → 최대 100배",
 "job system을 만들었는데 왜 기대만큼 안 빨라지나?",
 "직렬 구간(동기화 지점, 프레임 경계, 단일 스레드 시스템)이 상한을 정하기 때문입니다. <b>병렬화율을 올리는 것보다 직렬 구간을 찾아 없애는 게 이득이 큽니다.</b> 프로파일러로 직렬 구간부터 잽니다.",
 ""],

["D1-5","IEEE754 · 비정규수 · NaN","",
 "float = 부호1 + 지수8 + 가수23, <b>유효 자릿수 약 7자리</b>. 0 근처의 비정규수는 하드웨어 느린 경로로 빠져 수십 배 느려질 수 있다(FTZ/DAZ로 회피). NaN은 자기 자신과도 다르다.",
 "float 유효 ≈ 7자리\ndouble ≈ 15자리\n비정규수 페널티 수십 배",
 "NaN이 나오면 어떻게 추적하나?",
 "<b>x != x</b> 로 검사합니다. 발생 지점은 보통 0/0, sqrt(음수), inf-inf입니다. 디버그 빌드에서 부동소수점 예외를 켜서 첫 발생 지점에서 멈추게 하는 게 가장 빠릅니다.",
 "<b>+0과 -0은 == 이지만 비트가 다르다.</b> 해시 키로 쓰면 터진다."],

["D1-5","엔디안 · 정렬 · pack(1)이 안티패턴인 이유","⚑",
 "구조체는 멤버 정렬 때문에 패딩이 들어간다. <b>pack(1)은 패딩을 없애 크기를 줄이지만, 비정렬 접근을 만들어 느려지고 일부 아키텍처에선 크래시난다.</b> SIMD 로드는 정렬을 요구한다.",
 "",
 "그럼 네트워크 패킷 구조체는 어떻게 하나?",
 "메모리 레이아웃과 와이어 포맷을 <b>분리</b>합니다. pack(1)로 구조체를 직접 던지는 대신 명시적 직렬화를 쓰거나, FlatBuffers처럼 정렬을 보장하면서 zero-copy를 하는 포맷을 씁니다.",
 "멤버를 <b>크기 내림차순</b>으로 배치하면 패딩이 저절로 줄어든다 — pack 없이."],

["D1-6","측정 없는 최적화 · roofline","⚑",
 "<b>추측한 병목은 대부분 틀린다.</b> roofline: 성능은 연산 집약도(FLOP/byte)에 따라 대역폭 한계선 또는 연산 한계선에 걸린다. <b>대부분의 게임 코드는 대역폭 쪽</b>이라 연산을 줄여도 안 빨라진다.",
 "",
 "최적화를 어디서 시작하나?",
 "프로파일러로 시간이 실제로 어디 있는지 먼저 봅니다. 그다음 그 구간이 대역폭 바운드인지 연산 바운드인지를 캐시 미스율로 판정하고, 대역폭이면 데이터 레이아웃을, 연산이면 알고리즘이나 SIMD를 봅니다.",
 "<b>측정 없이 고친 건 최적화가 아니라 도박이다.</b>"],

["§ D2 · 운영체제","하드웨어는 하나, 프로그램은 여럿 → 시간/공간을 나누고, 나누면 공유와 대화가 생긴다"],

["D2-1","커널 경계 · syscall 비용","⚑",
 "Ring 3 → Ring 0 전환. 레지스터 저장, 권한 전환, 커널 스택 교체, 파라미터 검증. Spectre 완화(KPTI) 후 더 비싸졌다. <b>그래서 배칭이 최적화가 된다.</b>",
 "syscall ≈ 100~300 ns\n= 함수 호출의 수백 배",
 "왜 시스템 콜을 줄이는 게 최적화인가?",
 "전환 자체가 100ns대인데다 <b>캐시와 TLB가 오염</b>돼 돌아온 뒤 코드도 느려집니다. 그래서 recv를 여러 번 부르는 대신 큰 버퍼로 한 번, 로그를 매번 쓰는 대신 모아서 씁니다.",
 ""],

["D2-2","프로세스 vs 스레드","⚑⚑⚑",
 "<b>프로세스 = 주소 공간 + 핸들 테이블 + 보안 컨텍스트</b>(격리 단위). <b>스레드 = 스택 + 레지스터 + TLS</b>(스케줄 단위). 프로세스 스위치는 주소 공간이 바뀌어 TLB까지 날아간다.",
 "스레드 스위치 ~1~2μs\n프로세스 스위치 그 이상 (TLB)\n스레드 스택 기본 1MB 예약",
 "그럼 언제 프로세스를 나누나?",
 "<b>격리가 필요할 때만</b>입니다 — 크래시 격리, 보안 경계, 다른 권한. 공유 데이터가 많으면 IPC 비용이 이득을 삼킵니다. 게임에선 에디터-런타임 분리나 안티치트가 전형적입니다.",
 "\"스레드가 가벼워서 쓴다\"는 절반. <b>주소 공간 공유가 본질</b>이고, 그게 곧 레이스의 원인이다."],

["D2-2","컨텍스트 스위치 비용 분해","⚑",
 "<b>직접</b>: 레지스터 저장/복원, 스케줄러 실행. <b>간접</b>: 캐시 오염 + (프로세스 간이면) TLB flush. <b>간접이 직접보다 크다</b> — 돌아온 뒤 워킹셋을 다시 채워야 하니까.",
 "직접 ~1~2 μs\n간접(캐시 재적재) 그 이상",
 "그럼 스레드를 몇 개 만드나?",
 "CPU 바운드 워커는 <b>논리 코어 수</b>가 기본입니다. 그보다 많으면 스위치와 캐시 오염만 늘고 처리량은 안 늡니다. I/O 바운드는 다른 계산이고, 그건 스레드가 아니라 비동기로 푸는 게 맞습니다.",
 "\"스레드를 늘리면 빨라진다\"는 코어 수까지만 참."],

["D2-2","TLS · 구현과 비용","",
 "스레드마다 다른 전역. Windows에선 TEB가 TLS 배열을 가리킨다. <b>__declspec(thread)</b>는 정적 TLS라 빠르고, TlsAlloc은 동적이라 인덱싱이 한 번 더.",
 "",
 "TLS 접근이 전역 변수보다 느린가?",
 "정적 TLS면 TEB에서 오프셋 하나 더 타는 정도로 거의 같습니다. 동적이거나 DLL에서 지연 로드되면 더 비쌉니다.",
 "<b>파이버는 스레드를 갈아탈 수 있다.</b> 파이버 코드에서 TLS를 쓰면 다른 스레드에서 깨어난 뒤 다른 값을 본다 — 파이버 시스템의 대표 함정."],

["D2-3","Windows 스케줄링","",
 "우선순위 0~31(0=제로 페이지, 1~15 가변, 16~31 실시간). 퀀텀 만료 또는 선점으로 스위치. <b>동적 부스트</b>: I/O 완료·포그라운드·기아 방지로 우선순위를 임시로 올린다.",
 "우선순위 0~31\n기본 퀀텀 ≈ 수십 ms (워크스테이션은 짧게)",
 "게임에서 스레드 우선순위를 올리면 되나?",
 "거의 항상 나쁜 생각입니다. 실시간 대역(16+)은 시스템 스레드를 굶겨 입력·오디오가 끊깁니다. 진짜 해법은 <b>일을 줄이거나 코어에 고르게 펴는 것</b>이지 우선순위가 아닙니다.",
 ""],

["D2-3","우선순위 역전 · 상속","",
 "낮은 우선순위 스레드가 락을 쥔 채 선점되면, 높은 우선순위 스레드가 그 락을 무한 대기한다. 중간 우선순위가 CPU를 먹으면 영원히. <b>해법: 락 보유자의 우선순위를 임시로 올린다(상속).</b>",
 "",
 "실제로 겪을 일인가?",
 "Mars Pathfinder가 이것으로 재부팅을 반복한 유명한 사례가 있습니다. 실무에선 우선순위를 안 건드리는 게 최선의 예방입니다.",
 ""],

["D2-4","레이스의 정체","⚑⚑",
 "<b>i++는 세 명령이다</b> — LOAD, ADD, STORE. 사이에 선점되면 다른 스레드의 증가가 사라진다. 레이스는 버그가 아니라 <b>원자성 가정의 위반</b>.",
 "i++ = 3 명령\nLOCK XADD = 1 원자 연산",
 "i++가 한 줄인데 왜 원자적이 아닌가?",
 "소스 한 줄과 기계어 한 명령은 다릅니다. 메모리 값을 레지스터로 읽고, 더하고, 다시 쓰는 세 단계이고 <b>어느 사이에서든 선점될 수 있습니다</b>. x86의 LOCK XADD는 이걸 하나로 만듭니다.",
 ""],

["D2-4","원자성 / 가시성 / 순서 — 셋은 다른 문제","⚑⚑⚑",
 "<b>원자성</b>: 중간 상태가 안 보인다.<br><b>가시성</b>: 내 쓰기가 남에게 보인다(store buffer 문제).<br><b>순서</b>: 여러 쓰기의 관찰 순서(재정렬 문제).<br>대부분의 동시성 버그는 이 셋을 하나로 착각해서 생긴다.",
 "",
 "atomic을 쓰면 락이 필요 없나?",
 "atomic은 <b>연산 하나의</b> 원자성만 줍니다. 두 atomic 사이의 불변식은 여전히 깨집니다 — 잔고를 읽고 검사하고 차감하는 세 단계는 각각 원자적이어도 전체는 아닙니다. 그건 원자성이 아니라 <b>임계 구역 범위</b>의 문제입니다.",
 "<b>volatile은 셋 중 아무것도 안 준다.</b> 컴파일러 최적화 억제일 뿐 CPU 재정렬도 코히런스도 관여 안 함. C++에서 volatile은 MMIO용이지 동시성용이 아니다."],

["D2-4","Peterson · 왜 실제로 깨지나","",
 "소프트웨어만으로 상호 배제를 푸는 고전. <b>순차 일관성을 가정하는데 실제 하드웨어가 안 지킨다</b> — flag 쓰기와 상대 flag 읽기가 StoreLoad 재정렬되면 둘 다 진입한다.",
 "",
 "그럼 배울 가치가 있나?",
 "알고리즘 자체보다 <b>왜 깨지는지</b>가 핵심입니다. 이게 메모리 모델이 왜 필요한지, 왜 fence가 언어 계약에 있어야 하는지를 보여주는 가장 짧은 예제입니다.",
 ""],

["D2-4","CRITICAL_SECTION","⚑⚑",
 "<b>유저 모드 스핀 + 커널 폴백</b>. 무경합이면 인터락 연산 하나로 끝나 시스템 콜이 없다. 경합이 길어지면 이벤트로 잠든다. spin count를 설정 가능.",
 "무경합 ≈ 인터락 1회 (~20cyc)\n커널 폴백 ≈ syscall 비용",
 "Mutex 대신 CRITICAL_SECTION을 쓰는 이유는?",
 "Mutex는 <b>커널 오브젝트</b>라 매번 시스템 콜을 타고 프로세스 간에도 쓸 수 있습니다. CRITICAL_SECTION은 프로세스 내부 전용이라 무경합 경로를 유저 모드에서 끝냅니다. <b>프로세스 간이 필요 없으면 항상 이쪽</b>입니다.",
 "재귀 가능(같은 스레드가 여러 번 진입)이라 <b>실수로 중첩해도 안 터진다</b> — 그래서 설계 결함이 숨는다."],

["D2-4","SRWLOCK","",
 "포인터 하나 크기, 더 가볍다. <b>읽기-쓰기 분리</b>. 대신 <b>재귀 불가</b>(재진입하면 데드락), 우선순위 없음.",
 "SRWLOCK = 8바이트\nCRITICAL_SECTION = 40바이트+",
 "언제 SRWLOCK인가?",
 "읽기가 압도적으로 많고 재귀가 없을 때입니다. 쓰기가 잦으면 rw락의 오버헤드만 지불하고 이득이 없어서 일반 락이 낫습니다.",
 "재귀 불가가 함정. CRITICAL_SECTION에서 옮기면 조용히 데드락."],

["D2-4","Mutex · Semaphore · Event","⚑⚑",
 "셋 다 <b>커널 오브젝트</b> = 핸들 = 프로세스 간 가능 = 비싸다.<br><b>Mutex</b>: 소유권 있음, 버려지면 WAIT_ABANDONED.<br><b>Semaphore</b>: 카운트 N, 소유권 없음.<br><b>Event</b>: 신호/비신호, 수동 리셋(전체 깨움) vs 자동(하나만).",
 "커널 오브젝트 대기 = syscall",
 "Mutex와 Semaphore(1)의 차이는?",
 "<b>소유권</b>입니다. Mutex는 잠근 스레드만 풀 수 있고 그 스레드가 죽으면 버려진 상태로 알려줍니다. Semaphore는 아무나 올릴 수 있어서 <b>생산자-소비자처럼 다른 스레드가 신호를 주는 구조</b>에 맞습니다.",
 "<b>세마포어를 상호 배제에 쓰면 소유권이 없어 실수를 못 잡는다.</b> 상호 배제엔 뮤텍스, 자원 카운팅엔 세마포어."],

["D2-4","조건 변수 · 왜 while로 감싸나","⚑",
 "\"조건이 될 때까지 자고 있다가 깨워줘\". <b>반드시 while</b>: spurious wakeup, 그리고 깨어나 락을 잡는 사이 다른 스레드가 조건을 도로 깨뜨릴 수 있다.",
 "",
 "if로 쓰면 왜 안 되나?",
 "깨어난 시점에 조건이 참이라는 보장이 없기 때문입니다. 신호와 락 재획득 사이에 다른 스레드가 끼어들 수 있어서 <b>깨어난 뒤 반드시 다시 검사</b>해야 합니다.",
 "락을 놓고 signal하는지 쥐고 하는지는 성능만 다르고 정확성은 같다 — 단, 놓고 하면 lost wakeup 주의."],

["D2-4","데드락 4조건","⚑⚑",
 "<b>상호 배제 · 점유 대기 · 비선점 · 순환 대기.</b> 넷이 동시에 성립해야 발생 → <b>하나만 깨면 예방</b>. 실무 해법은 거의 항상 순환 대기 제거 = <b>락 순서 규칙</b>.",
 "",
 "실전에서 데드락을 어떻게 막나?",
 "락에 <b>전역 순서(락 계층)</b>를 정하고 항상 그 순서로만 잡습니다. 어길 수밖에 없으면 try_lock 후 실패 시 전부 놓고 재시도합니다. 가장 확실한 건 <b>락을 하나만 쥐는 설계</b>입니다.",
 "락을 쥔 채 콜백/가상함수를 부르면 남의 락 순서를 모른 채 중첩된다 — 데드락의 최대 원인."],

["D2-5","가상 메모리가 존재하는 이유 5가지","⚑",
 "<b>격리</b>(남의 메모리 못 봄) · <b>재배치</b>(어디 로드돼도 같은 주소) · <b>오버커밋</b>(물리보다 큰 주소 공간) · <b>공유</b>(DLL 한 벌을 여러 프로세스가) · <b>보호</b>(R/W/X 권한).",
 "x64 주소 공간 48비트 = 256TB\n페이지 4KB",
 "왜 4KB인가?",
 "페이지 테이블 크기와 내부 단편화의 절충입니다. 크면 테이블은 작아지지만 낭비가 늘고, 작으면 반대입니다. 그래서 큰 연속 영역엔 <b>2MB 대형 페이지</b>를 따로 씁니다.",
 ""],

["D2-5","4단계 페이징 · TLB","⚑⚑",
 "PML4 → PDPT → PD → PT → 물리. <b>변환 한 번에 메모리 4번 접근</b>이라 TLB 없으면 못 쓴다. <b>TLB reach = 엔트리 수 × 페이지 크기</b> — 이걸 넘으면 워킹셋이 캐시에 맞아도 TLB 미스가 난다.",
 "변환 = 메모리 4회\nTLB 미스 ≈ 수십~100+ cyc\nL1 dTLB ≈ 64엔트리 × 4KB = 256KB reach",
 "대형 페이지는 언제 이득인가?",
 "워킹셋이 TLB reach를 크게 넘을 때입니다. 2MB 페이지면 같은 엔트리 수로 reach가 512배가 됩니다. 대신 <b>내부 단편화</b>와 연속 물리 메모리 확보 실패라는 대가가 있습니다.",
 "\"캐시에 다 들어가는데 왜 느리지\"의 범인이 TLB인 경우가 많다."],

["D2-5","페이지 폴트 minor / major","⚑",
 "<b>minor</b>: 물리엔 있는데 매핑만 없음 — COW, 처음 터치, 이미 캐시된 파일. 마이크로초. <b>major</b>: 디스크에서 읽어야 함. <b>밀리초. 자릿수가 3~4개 다르다.</b>",
 "minor ≈ 1~5 μs\nmajor ≈ 0.1~10 ms  ← 프레임 파괴",
 "게임에서 major 폴트가 나면?",
 "프레임이 그냥 날아갑니다. 16.6ms 예산에 major 폴트 하나가 밀리초 단위라서요. 그래서 <b>런타임 경로에서 폴트가 나지 않도록 미리 터치하거나(prefault) 스트리밍을 별도 스레드로</b> 뺍니다.",
 "commit만으로는 물리 메모리가 안 붙는다 — <b>처음 쓰는 순간</b> minor 폴트가 난다. 아레나를 미리 memset하는 이유."],

["D2-5","COW (copy-on-write)","⚑",
 "복사하는 척만 하고 <b>양쪽을 읽기 전용으로 같은 물리 페이지에 매핑</b>. 누가 쓰면 그때 폴트를 내서 진짜 복사. fork가 싼 이유이고, DLL 코드 공유의 메커니즘.",
 "",
 "게임에서 COW를 만나나?",
 "직접 쓸 일은 드물지만 <b>DLL이 여러 프로세스에 공유되는 방식</b>이고, 메모리 매핑 파일로 에셋을 읽을 때 같은 원리가 작동합니다. 쓰기가 발생하면 그때 사본이 생겨 메모리가 늘어납니다.",
 ""],

["D2-6","I/O 4분면 · readiness vs completion","⚑⚑",
 "<b>블로킹/논블로킹</b>은 \"호출이 기다리나\", <b>동기/비동기</b>는 \"누가 복사하나\". 논블로킹≠비동기.<br><b>readiness</b>(select/epoll) = \"읽어도 돼\" → 내가 읽는다.<br><b>completion</b>(IOCP) = \"읽어놨어\" → 이미 버퍼에 있다.",
 "select O(n) → epoll O(1)",
 "epoll과 IOCP 중 뭐가 더 나은가?",
 "다른 모델입니다. epoll은 준비를 알려주고 복사는 내가 하니 <b>버퍼를 늦게 잡아도 되고</b>, IOCP는 커널이 이미 복사해놔서 <b>버퍼를 미리 주고 그 수명을 완료까지 책임져야</b> 합니다. 후자가 시스템 콜이 적고, 전자가 메모리에 유연합니다.",
 "\"논블로킹이면 비동기\"가 가장 흔한 오해. 논블로킹은 <b>실패하고 즉시 돌아오는 것</b>이지 남이 대신 해주는 게 아니다."],

["D2-7","IPC · 언제 프로세스를 나누나","⚑",
 "<b>파이프</b>(스트림/메시지, 로컬·원격) · <b>공유 메모리</b>(가장 빠름, 동기화는 별도) · <b>ALPC/COM</b>(Windows 내부 RPC) · <b>로컬 소켓</b>(느리지만 이식성).",
 "공유 메모리 ≈ 메모리 접근\n소켓 loopback ≈ syscall + 복사",
 "게임에서 IPC가 왜 나오나?",
 "에디터-런타임 분리, 크래시 격리, 안티치트 서비스, 빌드 툴 체인입니다. <b>격리가 목적이면 IPC 비용이 값이고, 성능이 목적이면 애초에 나누면 안 됩니다.</b>",
 "공유 메모리는 IPC 중 가장 빠르지만 <b>동기화를 주지 않는다</b> — 뮤텍스나 세마포어를 따로 붙여야 하고, 그 순간 프로세스 간 커널 오브젝트라 비싸진다."],

["§ D3 · 윈도우 시스템 프로그래밍","커널은 객체 지향 → 핸들로 접근 → 수명이 있다 → 그리고 PE와 로더 위에 산다"],

["D3-1","HANDLE = 핸들 테이블의 인덱스","⚑",
 "포인터가 아니라 <b>프로세스별 핸들 테이블의 인덱스</b>. 커널이 실제 오브젝트 포인터를 들고 있고 유저는 인덱스만 받는다 — 그래서 유저가 커널 주소를 못 본다. 오브젝트엔 핸들 카운트와 포인터 카운트가 따로 있다.",
 "",
 "왜 포인터를 안 주고 인덱스를 주나?",
 "보안과 검증입니다. 인덱스면 커널이 <b>유효성과 접근 권한을 매번 확인</b>할 수 있고, 유저가 임의 커널 주소를 만들어 넘길 수 없습니다.",
 "<b>이게 EntityHandle과 같은 아이디어</b> — 직접 포인터 대신 간접 참조로 검증 지점을 만드는 것. 좌표 W01에서 이 유사성을 방어할 수 있어야 한다."],

["D3-1","RAII 래퍼 · INVALID_HANDLE_VALUE 함정","⚑",
 "<b>unique_ptr에 커스텀 딜리터</b>로 감싸는 게 표준. 함정: <b>CreateFile은 실패 시 INVALID_HANDLE_VALUE(-1), CreateEvent 등은 NULL</b>. 무효 값이 API마다 다르다.",
 "",
 "왜 이게 함정인가?",
 "널 체크만 하는 래퍼를 만들면 CreateFile 실패를 못 잡고, -1을 CloseHandle에 넘기게 됩니다. <b>API마다 무효 값을 타입에 박아넣는</b> 래퍼가 필요합니다.",
 ""],

["D3-2","PE · IAT / EAT · 로더","",
 "DOS 스텁 → NT 헤더 → 섹션 테이블 → 섹션(.text/.data/.rdata/.reloc). <b>IAT</b>는 임포트 함수의 주소가 로드 시 채워지는 테이블 — 그래서 DLL 함수 호출은 <b>간접 점프 한 번</b>이 더 든다.",
 "DLL 호출 = 간접 점프 1회 추가",
 "정적 링크와 DLL 중 뭘 쓰나?",
 "<b>정적</b>은 호출이 직접이고 배포가 단순하지만 바이너리가 커지고 패치 시 전체 재배포입니다. <b>DLL</b>은 핫패치와 공유가 되지만 IAT 간접 비용과 버전 관리 문제가 생깁니다. 게임 런타임은 대개 정적, 툴은 DLL입니다.",
 ""],

["D3-2","DLL 경계에서 할당/해제 금지","⚑⚑⚑",
 "<b>DLL과 EXE가 각자 CRT를 정적 링크하면 힙이 별개다.</b> A 힙에서 new한 걸 B 힙에서 delete하면 즉시 크래시하거나 나중에 조용히 손상된다.",
 "",
 "그럼 DLL 인터페이스를 어떻게 설계하나?",
 "<b>할당한 쪽이 해제</b>하게 합니다 — DLL이 만든 건 DLL의 Free 함수로 돌려주거나, 호출자가 버퍼를 주고 DLL은 채우기만 합니다. 더 근본적으로는 <b>C ABI</b>로 경계를 긋고 STL 타입을 경계 너머로 안 넘깁니다.",
 "<b>std::string을 DLL 경계로 넘기는 게 대표적 사고.</b> 컴파일러/플래그가 다르면 레이아웃도 다르다."],

["D3-2","DllMain 로더 락","⚑",
 "DllMain은 <b>로더 락을 쥔 채</b> 호출된다. 여기서 LoadLibrary, 스레드 생성/대기, 다른 DLL 함수 호출을 하면 데드락.",
 "",
 "그럼 DLL 초기화는 어디서 하나?",
 "DllMain에선 <b>최소한만</b> 하고, 실제 초기화는 명시적 Init 함수를 노출해 호출자가 부르게 합니다. 전역 객체 생성자도 사실상 DllMain 안에서 도니까 같은 제약을 받습니다.",
 "전역 std::mutex나 스레드를 만드는 전역 객체가 DLL에 있으면 <b>이미 위반</b>이다."],

["D3-3","함수 호출 6단계 · Win x64 규약","⚑⚑",
 "인자 배치 → call(리턴 주소 push) → 프롤로그(스택 프레임) → 본체 → 에필로그 → ret.",
 "정수 인자: RCX RDX R8 R9\n부동: XMM0~3\n5번째부터 스택\nshadow space 32B (필수)\n스택 16B 정렬\n반환 RAX / XMM0",
 "shadow space는 왜 있나?",
 "호출된 함수가 레지스터로 받은 인자 4개를 <b>스택에 저장할 자리</b>가 필요할 때 쓰라고 호출자가 미리 32바이트를 비워둡니다. 가변 인자나 디버깅에서 인자를 스택에서 보게 하려는 목적도 있습니다.",
 "x64엔 __cdecl/__stdcall 구분이 사실상 없다 — 규약이 하나로 통일됐다."],

["D3-3","스택이 힙보다 빠른 이유 3가지","⚑",
 "<b>①</b> 할당이 포인터 감소 하나(탐색 없음) <b>②</b> 이미 캐시에 뜨거움(같은 영역을 계속 재사용) <b>③</b> 락이 없음(스레드 전용).",
 "스택 할당 ≈ 1 명령\nmalloc ≈ 수십~수백 cyc",
 "그럼 왜 힙을 쓰나?",
 "수명이 스코프를 넘어야 하거나, 크기가 컴파일 타임에 안 정해지거나, 스택 크기(기본 1MB)를 넘을 때입니다. <b>그 셋이 아니면 스택이 항상 맞습니다.</b>",
 ""],

["D3-3","zero-cost 예외의 진짜 의미","⚑",
 "<b>안 던지면 0, 던지면 매우 비싸다.</b> 테이블 기반이라 try 진입에 코드가 없다. 대신 던지면 언와인드 테이블을 조회하며 스택을 되감아 마이크로초 단위가 나온다.",
 "throw 1회 ≈ 수 μs\ntry 진입 ≈ 0",
 "게임에서 예외를 쓰나?",
 "런타임 핫패스에선 거의 안 씁니다. 비용 때문이 아니라 <b>결정론과 프레임 예산 예측 가능성</b> 때문입니다. 대신 로딩·툴·에디터처럼 프레임 밖에선 씁니다. 최근엔 expected 같은 값 기반 오류가 대안입니다.",
 "\"예외가 느려서 안 쓴다\"는 부정확. <b>안 던지면 공짜</b>이고, 문제는 던질 때의 비결정성."],

["D3-4","malloc 내부 · free가 크기를 아는 법","⚑⚑",
 "반환 포인터 <b>바로 앞에 청크 헤더</b>가 있고 거기 크기가 있다. free는 포인터를 뒤로 물려 헤더를 읽는다. 프리 리스트/빈으로 크기별 관리.",
 "헤더 오버헤드 ≈ 8~16B/할당\n→ 작은 객체를 많이 new하면 낭비가 지배",
 "그래서 왜 풀 할당자를 만드나?",
 "고정 크기면 헤더가 필요 없고, 프리 리스트가 인덱스 하나이고, <b>객체들이 연속 메모리에 밀집</b>해 순회가 캐시 친화적이 됩니다. malloc은 범용이라 이 셋을 다 포기합니다.",
 "포인터 바로 앞을 덮어쓰면(<b>버퍼 언더런</b>) free에서 터진다 — 크래시 지점이 원인 지점과 멀어진다."],

["D3-4","new vs malloc · 단편화","⚑",
 "<b>new = operator new(할당) + 생성자</b>. malloc은 메모리만. new[]/delete[]는 배열 개수를 헤더에 숨긴다.<br><b>내부 단편화</b>: 블록 안 낭비. <b>외부 단편화</b>: 총량은 남는데 연속 공간이 없음 — <b>장시간 도는 게임 서버의 진짜 적</b>.",
 "",
 "외부 단편화를 어떻게 막나?",
 "<b>수명이 비슷한 것끼리 같은 할당자</b>에 몰아넣습니다. 프레임 임시는 아레나에 넣고 프레임 끝에 통째로 리셋하면 단편화가 원리적으로 안 생깁니다. 크기가 같은 것은 풀에 넣습니다.",
 "malloc/free와 new/delete를 섞으면 UB. new[]에 delete를 쓰면 개수 헤더가 어긋난다."],

["D3-4","align up · alignment가 필요한 이유","⚑",
 "<code>(p + a - 1) & ~(a - 1)</code>  — a는 2의 거듭제곱.<br>이유: ① 하드웨어가 정렬 접근만 허용하거나 느림 ② SIMD 로드가 요구 ③ 캐시 라인 걸침 방지 ④ 원자 연산의 전제.",
 "align up: (p + a-1) & ~(a-1)\n64B 정렬 → false sharing 차단",
 "왜 &~(a-1)로 내림이 되나?",
 "a가 2의 거듭제곱이면 a-1이 하위 비트 마스크가 되고, 그 보수와 AND하면 하위 비트가 지워져 a의 배수로 내려갑니다. 먼저 a-1을 더해놓으면 <b>올림</b>이 됩니다.",
 "손으로 쓸 수 있어야 한다 — 화이트보드 단골."],

["D3-5","크래시 주소 패턴","⚑⚑",
 "<b>주소가 원인을 말해준다.</b> 이 표 하나로 디버깅 시간이 자릿수로 줄어든다.",
 "0x00000000  nullptr\n0xCCCCCCCC  미초기화 스택 (/RTC)\n0xCDCDCDCD  미초기화 힙 (debug new)\n0xDDDDDDDD  해제된 힙\n0xFEEEFEEE  HeapFree된 메모리\n0xBAADF00D  미초기화 LocalAlloc\n작은 값(<64K) 널 구조체의 멤버 오프셋",
 "0xDDDDDDDD가 떴다. 뭘 의심하나?",
 "<b>use-after-free</b>입니다. 해제된 객체를 누가 계속 들고 있다는 뜻이라, 소유권 설계를 봅니다. 재현이 안 되면 <b>PageHeap</b>을 켜서 해제 즉시 페이지를 언매핑해 첫 접근에서 터지게 만듭니다.",
 "이 패턴들은 <b>디버그 빌드에서만</b> 나온다. 릴리즈에선 쓰레기 값이라 더 어렵다."],
