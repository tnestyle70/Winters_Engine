name: aws-staging-deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable Git SHA to build and deploy"
        required: true
      desired_count:
        description: "Final desired task count per service"
        required: true
        default: "1"

permissions:
  contents: read
  id-token: write

concurrency:
  group: winters-aws-staging
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_IN_AUTOMATION: "true"
  TF_VAR_environment: dev
  TF_VAR_image_tag: ${{ inputs.image_tag }}
  TF_VAR_kafka_brokers: ${{ secrets.WINTERS_KAFKA_BROKERS }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: aws-staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Initialize Terraform
        working-directory: infra/aws
        run: >-
          terraform init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="key=winters/dev/terraform.tfstate"
          -backend-config="region=${AWS_REGION}"
          -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
          -backend-config="encrypt=true"

      - name: Provision infrastructure and ECR
        working-directory: infra/aws
        run: terraform apply -auto-approve -var="deploy_services=false"

      - name: Verify application secret is populated
        working-directory: infra/aws
        run: |
          secret_arn="$(terraform output -raw application_secret_arn)"
          secret_json="$(aws secretsmanager get-secret-value --secret-id "$secret_arn" --query SecretString --output text)"
          for key in JWT_ACCESS_SECRET JWT_REFRESH_SECRET WINTERS_MATCH_TICKET_SECRET REPLAY_INTERNAL_TOKEN; do
            test "$(jq -r --arg key "$key" '.[$key] | length' <<<"$secret_json")" -ge 32
          done

      - name: Build and push immutable images
        working-directory: infra/aws
        run: |
          repositories="$(terraform output -json ecr_repository_urls)"
          cd ../..
          for service in auth leaderboard matchmaking profile payment shop replay migrate; do
            repository="$(jq -r --arg service "$service" '.[$service]' <<<"$repositories")"
            docker build --file Services/Dockerfile --build-arg SERVICE="$service" --tag "$repository:${{ inputs.image_tag }}" .
            docker push "$repository:${{ inputs.image_tag }}"
          done

      - name: Register tasks with services scaled to zero
        working-directory: infra/aws
        run: terraform apply -auto-approve -var="deploy_services=true" -var="desired_count=0"

      - name: Run migration task and require exit zero
        working-directory: infra/aws
        run: |
          cluster="$(terraform output -raw ecs_cluster_name)"
          task_definition="$(terraform output -raw migration_task_definition_arn)"
          subnets="$(terraform output -json private_subnet_ids | jq -r 'join(",")')"
          security_group="$(terraform output -raw ecs_security_group_id)"
          task_arn="$(aws ecs run-task --cluster "$cluster" --launch-type FARGATE --task-definition "$task_definition" --network-configuration "awsvpcConfiguration={subnets=[$subnets],securityGroups=[$security_group],assignPublicIp=DISABLED}" --query 'tasks[0].taskArn' --output text)"
          test "$task_arn" != "None"
          aws ecs wait tasks-stopped --cluster "$cluster" --tasks "$task_arn"
          exit_code="$(aws ecs describe-tasks --cluster "$cluster" --tasks "$task_arn" --query 'tasks[0].containers[0].exitCode' --output text)"
          test "$exit_code" = "0"

      - name: Scale services and wait for stability
        working-directory: infra/aws
        run: |
          terraform apply -auto-approve -var="deploy_services=true" -var="desired_count=${{ inputs.desired_count }}"
          cluster="$(terraform output -raw ecs_cluster_name)"
          for service in auth leaderboard matchmaking profile payment shop replay; do
            aws ecs wait services-stable --cluster "$cluster" --services "$service"
          done

      - name: Health smoke
        working-directory: infra/aws
        run: |
          base_url="$(terraform output -raw api_base_url)"
          curl --fail --retry 5 --retry-delay 5 "$base_url/health"
